<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round">
  <!-- Baselines (diamond edges as lines) -->
  <line x1="12" y1="2" x2="22" y2="12" fill="none"/>
  <line x1="22" y1="12" x2="12" y2="22" fill="none"/>
  <line x1="12" y1="22" x2="2" y2="12" fill="none"/>
  <line x1="2" y1="12" x2="12" y2="2" fill="none"/>
  <!-- Bases (45-degree rotated squares at corners) -->
  <rect x="10.5" y="0.5" width="3" height="3" transform="rotate(45 12 2)" fill="currentColor" stroke="none"/>
  <rect x="20.5" y="10.5" width="3" height="3" transform="rotate(45 22 12)" fill="currentColor" stroke="none"/>
  <rect x="10.5" y="20.5" width="3" height="3" transform="rotate(45 12 22)" fill="currentColor" stroke="none"/>
  <rect x="0.5" y="10.5" width="3" height="3" transform="rotate(45 2 12)" fill="currentColor" stroke="none"/>
  <!-- Pitcher's mound -->
  <circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/>
</svg>
